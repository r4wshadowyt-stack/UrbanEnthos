<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>UrbanEthos | Forgot Password</title>

    <link rel="stylesheet" href="forgot.css">

</head>

<body>

    <!-- Background -->

    <div class="background">

        <div id="stars"></div>

    </div>

    <!-- Lamp -->

    <div class="lamp">

        <div class="wire"></div>

        <div class="shade">

            <div class="bulb">

                <span class="filament"></span>

            </div>

        </div>

        <div class="string" id="string"></div>

    </div>

    <!-- Light -->

    <div class="light" id="light">

        <span class="dust" style="left:45%;bottom:90px;"></span>

        <span class="dust" style="left:52%;bottom:170px;"></span>

        <span class="dust" style="left:48%;bottom:260px;"></span>

        <span class="dust" style="left:55%;bottom:340px;"></span>

    </div>

    <!-- Forgot Password Card -->

    <div class="login-box" id="loginBox">

        <h2>Forgot Password</h2>

        <p class="subtitle">

            Enter your registered email address.
            We'll send you a password reset link.

        </p>

        <form id="forgotForm">

            <div class="input-group">

                <input
                    type="email"
                    id="email"
                    required>

                <label>Email Address</label>

            </div>

            <button
                type="submit"
                class="login-btn">

                Send Reset Link

            </button>

        </form>

        <div class="bottom">

            <a href="login.html">

                ← Back to Login

            </a>

        </div>

    </div>

    <script src="forgot.js"></script>

</body>

</html>
