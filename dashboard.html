<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>UrbanEthos | Dashboard</title>

    <link rel="stylesheet" href="dashboard.css">

    <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

</head>

<body>

<!--==========================
        SIDEBAR
===========================-->

<aside class="sidebar">

    <div class="logo">

        <img
        src="image/logo1.jpg"
        alt="UrbanEthos">

        <h2>UrbanEthos</h2>

    </div>

    <ul class="menu">

        <li class="active">

            <a href="#">

                🏠 Dashboard

            </a>

        </li>

        <li>

            <a href="#">

                📦 My Orders

            </a>

        </li>

        <li>

            <a href="#">

                ❤️ Wishlist

            </a>

        </li>

        <li>

            <a href="#">

                🛒 Cart

            </a>

        </li>

        <li>

            <a href="#">

                👤 Profile

            </a>

        </li>

        <li>

            <a href="#">

                ⚙ Settings

            </a>

        </li>

        <li>

            <a href="login.html">

                🚪 Logout

            </a>

        </li>

    </ul>

</aside>

<!--==========================
        MAIN CONTENT
===========================-->

<div class="main-content">

    <!-- Top Bar -->

    <header class="topbar">

        <div>

            <h1>

                Welcome,

                <span id="username">

                    User

                </span>

                👋

            </h1>

            <p>

                Manage your UrbanEthos account.

            </p>

        </div>

        <div class="profile">

            <img
            src="image/profile.png"
            alt="Profile">

        </div>

    </header>

    <!-- Stats -->

    <section class="stats">

        <div class="card">

            <h2>

                0

            </h2>

            <p>

                Orders

            </p>

        </div>

        <div class="card">

            <h2>

                0

            </h2>

            <p>

                Wishlist

            </p>

        </div>

        <div class="card">

            <h2>

                0

            </h2>

            <p>

                Cart Items

            </p>

        </div>

        <div class="card">

            <h2>

                ₹0

            </h2>

            <p>

                Total Spent

            </p>

        </div>

    </section>

    <!-- Recent Orders -->

    <section class="orders">

        <h2>

            Recent Orders

        </h2>

        <table>

            <thead>

                <tr>

                    <th>Order ID</th>

                    <th>Product</th>

                    <th>Status</th>

                    <th>Amount</th>

                </tr>

            </thead>

            <tbody>

                <tr>

                    <td>#UE1001</td>

                    <td>No Orders Yet</td>

                    <td>--</td>

                    <td>₹0</td>

                </tr>

            </tbody>

        </table>

    </section>

</div>

<script src="dashboard.js"></script>

</body>

</html>
