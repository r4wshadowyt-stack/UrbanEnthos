<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>UrbanEthos | Create Account</title>

    <link rel="stylesheet" href="register.css">

</head>

<body>

    <!-- Background -->

    <div class="background">

        <div id="stars"></div>

    </div>

    <!-- Lamp -->

    <div class="lamp">

        <div class="wire"></div>

        <div class="shade">

            <div class="bulb">

                <span class="filament"></span>

            </div>

        </div>

        <div class="string" id="string"></div>

    </div>

    <!-- Light Cone -->

    <div class="light" id="light">

        <span class="dust" style="left:45%;bottom:80px;"></span>
        <span class="dust" style="left:52%;bottom:180px;"></span>
        <span class="dust" style="left:48%;bottom:320px;"></span>
        <span class="dust" style="left:56%;bottom:420px;"></span>

    </div>

    <!-- Register Card -->

    <div class="login-box" id="loginBox">

        <h2>Create Account</h2>

        <p class="subtitle">

            Join the UrbanEthos family

        </p>

        <form id="registerForm">

            <div class="input-group">

                <input
                    type="text"
                    id="name"
                    required>

                <label>Full Name</label>

            </div>

            <div class="input-group">

                <input
                    type="email"
                    id="email"
                    required>

                <label>Email Address</label>

            </div>

            <div class="input-group">

                <input
                    type="tel"
                    id="phone"
                    required>

                <label>Phone Number</label>

            </div>

            <div class="input-group">

                <input
                    type="password"
                    id="password"
                    required>

                <label>Password</label>

            </div>

            <div class="input-group">

                <input
                    type="password"
                    id="confirmPassword"
                    required>

                <label>Confirm Password</label>

            </div>

            <button
                type="submit"
                class="login-btn">

                Create Account

            </button>

        </form>

        <div class="bottom">

            <span>

                Already have an account?

            </span>

            <a href="login.html">

                Login

            </a>

        </div>

    </div>

    <script src="register.js"></script>

</body>

</html>
